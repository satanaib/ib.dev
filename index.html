<script>
function getEmptyPrice() {
if (typeof CONFIG === 'undefined') return 0;
return CONFIG.emptycharmPrice || CONFIG.charmPrice || 0;
}
let zone, catalogContainer, totalPriceDisplay;
let currentCanvas = null;
let currentCanvasRotated = null;
document.addEventListener('DOMContentLoaded', () => {
  if (typeof CONFIG === 'undefined') return;
  initApp();
});
function initApp() {
zone = document.getElementById('bracelet-zone');
catalogContainer = document.getElementById('catalog-container');
totalPriceDisplay = document.getElementById('total-price');
const logoImg = document.getElementById('app-logo');
if (CONFIG.LOGO && CONFIG.LOGO.trim() !== "") {
logoImg.src = CONFIG.LOGO;
logoImg.style.display = "block";
}
const emptyP = getEmptyPrice();
const charmP = CONFIG.charmPrice || 0;
const cur = CONFIG.currency || '$';
const modalEmpty = document.getElementById('modal-empty-price');
const modalCharm = document.getElementById('modal-charm-price');
if(modalEmpty) modalEmpty.innerText = `${cur}${emptyP}`;
if(modalCharm) modalCharm.innerText = `${cur}${charmP}`;
const root = document.documentElement;
const h = 65;
const r = CONFIG.render.frameWidth / CONFIG.render.frameHeight;
root.style.setProperty('--frame-h', `${h}px`);
root.style.setProperty('--frame-w', `${h * r}px`);
root.style.setProperty('--inner-w', `${CONFIG.render.scaleX * 100}%`);
root.style.setProperty('--inner-h', `${CONFIG.render.scaleY * 100}%`);
root.style.setProperty('--inner-left', `${(0.5 + CONFIG.render.moveX) * 100}%`);
root.style.setProperty('--inner-top', `${(0.5 + CONFIG.render.moveY) * 100}%`);
if (typeof Sortable !== 'undefined') {
new Sortable(zone, {
animation: 150,
ghostClass: 'sortable-ghost',
filter: '.empty-msg',
onEnd: updateTotal
});
}
if (navigator.share) {
const btnShare = document.getElementById('btn-share');
if(btnShare) btnShare.style.display = 'block';
}
initCatalog();
updateTotal();
setTimeout(() => {
const loadingOverlay = document.getElementById('loading-overlay');
if (loadingOverlay) {
loadingOverlay.classList.add('loading-hidden');
setTimeout(() => {
loadingOverlay.style.display = 'none';
}, 300);
}
}, 800);
}
function initCatalog() {
if (typeof CHARMS_DB === 'undefined' || !catalogContainer) return;
const fragment = document.createDocumentFragment();
CHARMS_DB.forEach((charm, index) => {
const img = document.createElement('img');
img.src = charm.src;
img.className = 'charm-source';
img.loading = "lazy";
const isSpecial = (index === 0);
img.onclick = () => addCharm(charm, isSpecial);
fragment.appendChild(img);
});
catalogContainer.appendChild(fragment);
}
function addCharm(charmObj, isSpecialType) {
const emptyText = document.getElementById('empty-text');
if(emptyText) emptyText.style.display = 'none';
const wrapper = document.createElement('div');
wrapper.className = 'charm-wrapper';
const thisPrice = isSpecialType ? getEmptyPrice() : CONFIG.charmPrice;
wrapper.dataset.price = thisPrice;
if (isSpecialType) wrapper.dataset.type = "special";
const safeFrames = (typeof FRAMES !== 'undefined') ? FRAMES : { DEFAULT: '', FIRST: '' };
let frameUrl = safeFrames.DEFAULT;
if (isSpecialType && safeFrames.FIRST) frameUrl = safeFrames.FIRST;
wrapper.innerHTML = `<img src="${charmObj.src}" class="charm-img-layer"><div class="frame-layer" style="background-image: url('${frameUrl}')"></div>`;
wrapper.onclick = function() {
if(confirm("¿Eliminar este adorno?")) {
this.style.opacity = '0';
this.style.transform = 'scale(0.8)';
setTimeout(() => {
this.remove();
updateTotal();
checkEmpty();
}, 150);
}
};
zone.appendChild(wrapper);
updateTotal();
setTimeout(() => {
const scroller = document.getElementById('scroll-container');
if(scroller) {
scroller.scrollTo({ left: scroller.scrollWidth, behavior: 'smooth' });
}
}, 50);
}
function checkEmpty() {
const count = zone.querySelectorAll('.charm-wrapper').length;
const emptyText = document.getElementById('empty-text');
if(count === 0 && emptyText) emptyText.style.display = 'block';
}
function updateTotal() {
if(!zone) return;
const wrappers = zone.querySelectorAll('.charm-wrapper');
let total = 0;
wrappers.forEach(el => {
const p = parseFloat(el.dataset.price);
if(!isNaN(p)) total += p;
});
if(totalPriceDisplay) {
totalPriceDisplay.innerText = `${CONFIG.currency}${total.toLocaleString()}`;
}
}
// --- GENERADOR CANVAS ---
async function generateCanvas() {
const wrappers = zone.querySelectorAll('.charm-wrapper');
if(wrappers.length === 0) {
alert("Agrega adornos a tu pulsera primero");
return null;
}
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
const itemW = CONFIG.render.frameWidth;
const itemH = CONFIG.render.frameHeight;
const overlap = itemW * 0.025;
const totalW = (wrappers.length * itemW) - (wrappers.length - 1) * overlap;
canvas.width = Math.max(800, totalW + 100);
canvas.height = itemH + 300;
ctx.fillStyle = "#ffffff";
ctx.fillRect(0,0, canvas.width, canvas.height);
const startX = (canvas.width - totalW) / 2;
const startY = (canvas.height - itemH) / 2;
const safeFrames = (typeof FRAMES !== 'undefined') ? FRAMES : { DEFAULT: '' };
const frameDefaultImg = await loadImage(safeFrames.DEFAULT);
const frameFirstImg = (safeFrames.FIRST) ? await loadImage(safeFrames.FIRST) : frameDefaultImg;
for(let i=0; i<wrappers.length; i++) {
const wrapper = wrappers[i];
const charmImg = await loadImage(wrapper.querySelector('.charm-img-layer').src);
const isSpecial = (wrapper.dataset.type === "special");
const frameToUse = isSpecial ? frameFirstImg : frameDefaultImg;
const x = startX + (i * (itemW - overlap));
const y = startY;
const chW = itemW * CONFIG.render.scaleX;
const chH = itemH * CONFIG.render.scaleY;
const chX = x + ((itemW/2) + (itemW * CONFIG.render.moveX) - (chW/2));
const chY = y + ((itemH/2) + (itemH * CONFIG.render.moveY) - (chH/2));
ctx.shadowColor = "rgba(0,0,0,0.15)";
ctx.shadowBlur = 15;
ctx.shadowOffsetY = 10;
if(charmImg) drawImageProp(ctx, charmImg, chX, chY, chW, chH);
if(frameToUse) ctx.drawImage(frameToUse, x, y, itemW, itemH);
ctx.shadowColor = "transparent";
}
const textY = 80;
ctx.textAlign = "center";
if (CONFIG.LOGO && CONFIG.LOGO.trim() !== "") {
const logoImg = await loadImage(CONFIG.LOGO);
if(logoImg) {
const logoSize = 60;
ctx.drawImage(logoImg, (canvas.width/2) - (logoSize/2), textY - 70, logoSize, logoSize);
}
}
ctx.fillStyle = "#333";
ctx.font = "300 24px Helvetica Neue, Helvetica, sans-serif";
ctx.fillText("ITALIAN BRACELETS", canvas.width/2, textY + 30);
const priceText = totalPriceDisplay ? totalPriceDisplay.innerText : "$0";
ctx.fillText(`Total: ${priceText}`, canvas.width/2, canvas.height - 40);
return canvas;
}
// --- ROTAR CANVAS 90° (para visualización vertical) ---
function rotateCanvas90Degrees(canvas) {
    const rotatedCanvas = document.createElement('canvas');
    const ctx = rotatedCanvas.getContext('2d');
    rotatedCanvas.width = canvas.height;
    rotatedCanvas.height = canvas.width;
    ctx.translate(rotatedCanvas.width / 2, rotatedCanvas.height / 2);
    ctx.rotate(90 * Math.PI / 180);
    ctx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
    return rotatedCanvas;
}
// Helpers
function loadImage(src) {
return new Promise((res, rej) => {
if(!src) {
console.warn("Intentando cargar imagen vacía");
res(null);
return;
}
const i = new Image();
i.crossOrigin="anonymous";
i.onload = () => {
console.log("Imagen cargada exitosamente:", src);
res(i);
};
i.onerror = (error) => {
console.warn("Error cargando imagen:", src, error);
res(null);
};
i.src = src;
});
}
function drawImageProp(ctx, img, x, y, w, h) {
const r = Math.min(w / img.width, h / img.height);
ctx.drawImage(img, x + (w - img.width * r)/2, y + (h - img.height * r)/2, img.width * r, img.height * r);
}
// --- LÓGICA DEL MODAL DE VISUALIZACIÓN ---
function openViewModal(canvas) {
    currentCanvas = canvas;
    currentCanvasRotated = rotateCanvas90Degrees(canvas);
    const img = document.getElementById('view-img');
    img.src = currentCanvasRotated.toDataURL('image/jpeg', 0.9);
    const modal = document.getElementById('view-modal');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('active'), 10);
}
function closeViewModal() {
    const modal = document.getElementById('view-modal');
    modal.classList.remove('active');
    setTimeout(() => modal.style.display = 'none', 300);
}
window.toggleModal = () => {
const m = document.getElementById('info-modal');
if(m) m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
};
document.getElementById('btn-clear').onclick = () => {
if(confirm("¿Limpiar toda la pulsera?")) {
zone.innerHTML = '<div class="empty-msg" id="empty-text">Pulsera vacía</div>';
updateTotal();
}
};
// ==========================================
// 👁️ BOTÓN VISUALIZAR
// ==========================================
document.getElementById('btn-view').onclick = async function() {
const btn = this;
const oldText = btn.innerText;
btn.innerText = 'Cargando...';
btn.disabled = true;
try {
    const canvas = await generateCanvas();
    if(canvas) {
        openViewModal(canvas);
    }
} catch(e) {
console.error(e);
alert("Error al procesar el diseño. Por favor, inténtalo de nuevo.");
} finally {
    btn.innerText = oldText;
    btn.disabled = false;
}
};
// Descargar desde header
document.getElementById('btn-download-from-header').onclick = function() {
    if(!currentCanvas) return;
    const link = document.createElement('a');
    link.download = `Diseño_${Date.now()}.jpg`;
    link.href = currentCanvas.toDataURL('image/jpeg', 0.9);
    link.click();
};
// ==========================================
// 📤 BOTÓN COMPARTIR
// ==========================================
const btnShare = document.getElementById('btn-share');
if(btnShare) {
btnShare.onclick = async function() {
const btn = this;
const oldText = btn.innerText;
btn.innerText = "...";
btn.disabled = true;
try {
    const canvas = await generateCanvas();
    if(canvas) {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
        if (blob) {
            const file = new File([blob], "diseño_pulsera.jpg", { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: CONFIG.brandName || 'Mi Diseño',
                        text: '¡Mira la pulsera que diseñé!'
                    });
                } catch(shareErr) {
                    console.log("Acción de compartir cancelada o falló:", shareErr);
                }
            } else {
                alert("Tu dispositivo no soporta compartir directamente. Usa Visualizar y luego Guarda.");
            }
        }
    }
} catch(err) {
    console.error("Error crítico en share:", err);
    alert("Error al compartir. Por favor, inténtalo de nuevo.");
} finally {
    btn.innerText = oldText;
    btn.disabled = false;
}
};
}
// Ajustes responsive
document.addEventListener('DOMContentLoaded', function() {
const subtitle = document.querySelector('.subtitle');
if (window.innerWidth <= 480) {
subtitle.style.whiteSpace = 'normal';
subtitle.style.textAlign = 'center';
}
});
</script>
</body>
</html>
